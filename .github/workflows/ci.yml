name: ci

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --manifest-path backend/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path backend/Cargo.toml --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test --manifest-path backend/Cargo.toml --locked
      - name: Migration filenames
        shell: bash
        run: |
          set -euo pipefail
          find backend/migrations -maxdepth 1 -type f -name '*.sql' -printf '%f\n' |
            awk '!/^[0-9]{14}_[a-z0-9_]+\.sql$/ { print "bad migration filename: "$0; bad=1 } END { exit bad }'
      - name: Cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit --file backend/Cargo.lock

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint -- --max-warnings=0
      - name: Test
        working-directory: frontend
        run: npm test -- --run
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: NPM audit
        working-directory: frontend
        run: npm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
